<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Calculator</title>
    <meta name="description" content="A beautiful and functional vanilla JavaScript calculator.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="display" id="display">0</div>
            <div class="buttons">
                <button class="btn clear span-two" id="btn-clear" data-action="clear">C</button>
                <button class="btn delete" id="btn-delete" data-action="delete">DEL</button>
                <button class="btn operator" id="btn-divide" data-action="operator" data-value="÷">÷</button>
                
                <button class="btn number" id="btn-7" data-value="7">7</button>
                <button class="btn number" id="btn-8" data-value="8">8</button>
                <button class="btn number" id="btn-9" data-value="9">9</button>
                <button class="btn operator" id="btn-multiply" data-action="operator" data-value="×">×</button>
                
                <button class="btn number" id="btn-4" data-value="4">4</button>
                <button class="btn number" id="btn-5" data-value="5">5</button>
                <button class="btn number" id="btn-6" data-value="6">6</button>
                <button class="btn operator" id="btn-subtract" data-action="operator" data-value="−">−</button>
                
                <button class="btn number" id="btn-1" data-value="1">1</button>
                <button class="btn number" id="btn-2" data-value="2">2</button>
                <button class="btn number" id="btn-3" data-value="3">3</button>
                <button class="btn operator" id="btn-add" data-action="operator" data-value="+">+</button>
                
                <button class="btn number span-two" id="btn-0" data-value="0">0</button>
                <button class="btn number decimal" id="btn-decimal" data-value=".">.</button>
                <button class="btn equals" id="btn-equals" data-action="equals">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
